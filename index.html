<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pediatric Dose Calculator</title>
<style>
body{
font-family: 'Segoe UI', sans-serif;
background:#f4f7fb;
padding:20px;
margin:0;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:24px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
color:#1565c0;
margin-bottom:5px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

input,select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1565c0;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:20px;
padding:20px;
background:#f8fbff;
border-radius:16px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
}

.result{
background:#f5f5f5;
padding:15px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>🩺 Pediatric Dose Calculator</h1>

<div class="subtitle">
โรงพยาบาลถลาง
</div>

<input
id="weight"
type="number"
placeholder="Weight (kg)"
>

<select id="drug"></select>

<button onclick="calculate()">
Calculate Dose
</button>

<div class="result" id="result"></div>

</div>

</div>

<script>
<h2>Pediatric Dose Calculator</h2>

<input id="weight" type="number" placeholder="Weight (kg)">

<select id="drug"></select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>
<script>

const SHEET_ID="15rif9LPKAhaMZjvXKSwruZEZF8pfrOoYo3BTXPj1qk4";

async function loadDrugs(){

const url=`https://opensheet.elk.sh/${SHEET_ID}/Drug_Master`;

const res = await fetch(url);

if(!res.ok){
  throw new Error("Cannot load Google Sheet");
}

const data = await res.json();

console.log(data);

window.drugs=data;

const select=document.getElementById("drug");

data.forEach(d=>{
const option=document.createElement("option");
option.value=d.Name;
option.text=d.Name;
select.appendChild(option);
});

}

function calculate(){

const weight=parseFloat(document.getElementById("weight").value);

const selected=document.getElementById("drug").value;

const drug=drugs.find(d=>d.Name===selected);

const doseMin = weight * parseFloat(drug["Min (mkday)"]);
const doseMax = weight * parseFloat(drug["Max (mkday)"]);

const volMin = doseMin / parseFloat(drug["Conc per mL (mg/mL)"]);
const volMax = doseMax / parseFloat(drug["Conc per mL (mg/mL)"]);

const maxDailyRaw = drug["MaxDailyDose_mg"];

console.log("MaxDailyDose_mg =", maxDailyRaw);

const maxDaily = Number(maxDailyRaw);

console.log("maxDaily =", maxDaily);

document.getElementById("result").innerHTML=
`
<h2>${drug.Name}</h2>

<hr>

<h3>Recommended Dose</h3>
<p>
${doseMin.toFixed(1)} - ${doseMax.toFixed(1)} mg/dose
</p>

<h3>Volume</h3>
<p>
${volMin.toFixed(1)} - ${volMax.toFixed(1)} mL/dose
</p>

<h3>Maximum Daily Dose</h3>
<p>
${maxDaily.toLocaleString()} mg/day
</p>
`;

}

loadDrugs();

</script>
</body>
</html>
