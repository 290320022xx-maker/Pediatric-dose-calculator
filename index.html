<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pediatric Dose Calculator</title>
<style>
label{
display:block;
font-weight:600;
color:#444;
margin-top:10px;
margin-bottom:5px;
}
  
body{
font-family: 'Segoe UI', sans-serif;
background:#f4f7fb;
padding:20px;
margin:0;
}

.age-row{
display:flex;
gap:10px;
align-items:center;
}

#age{
flex:2;
}

#ageUnit{
flex:1;
}

.footer{
text-align:center;
margin-top:30px;
font-size:13px;
color:#999;
}
  
.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:24px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
color:#1565c0;
margin-bottom:5px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

input,select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1565c0;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:20px;
padding:20px;
background:#f8fbff;
border-radius:16px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
}

.result{
background:#e3f2fd;
padding:20px;
border-radius:15px;
margin-top:20px;
border-left:5px solid #1565c0;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>🩺 Pediatric Dose Calculator</h1>

<div class="subtitle">
Thalang Hospital
</div>

<label for="age">Age</label>

<div class="age-row">

<input
id="age"
type="number"
placeholder="Enter age"
>

<select id="ageUnit">
<option value="year">Year</option>
<option value="month">Month</option>
</select>

</div>

<label for="weight">Weight (kg)</label>
<input
id="weight"
type="number"
placeholder="Enter weight"
>

<label for="drug">Drug</label>

<input
list="druglist"
id="drug"
placeholder="Search drug..."
onchange="updateIndications()"
>

<datalist id="druglist"></datalist>

<div id="indicationSection" style="display:none">

<label for="indication">Indication</label>

<select id="indication">
<option value="">Select indication</option>
</select>

</div>

<button onclick="calculate()">
Calculate Dose
</button>

<div class="result" id="result"></div>

</div>

</div>

<div class="footer">
Developed by Pinphong Cononghai, PharmD
</div>

<script>

const SHEET_ID="15rif9LPKAhaMZjvXKSwruZEZF8pfrOoYo3BTXPj1qk4";

async function loadDrugs(){

const url=`https://opensheet.elk.sh/${SHEET_ID}/Drug_Master`;

const res = await fetch(url);

if(!res.ok){
  throw new Error("Cannot load Google Sheet");
}

const data = await res.json();

console.log(data);

window.drugs=data;

const list=document.getElementById("druglist");

const uniqueDrugs=[...new Set(data.map(d=>d.Name))];

uniqueDrugs.forEach(name=>{

const option=document.createElement("option");

option.value=name;

list.appendChild(option);

});
  
}

function updateIndications(){

const selectedDrug=document.getElementById("drug").value;

const rows=drugs.filter(d=>d.Name===selectedDrug);

const uniqueIndications=[
...new Set(rows.map(r=>r.Indication))
];

const select=document.getElementById("indication");

select.innerHTML="<option value=''>Select indication</option>";

uniqueIndications.forEach(ind=>{

const option=document.createElement("option");

option.value=ind;

option.text=ind;

select.appendChild(option);
  
document.getElementById("indicationSection").style.display="block";

});

}

function calculate(){

const weight=parseFloat(document.getElementById("weight").value);

let age=parseFloat(document.getElementById("age").value);

const unit=document.getElementById("ageUnit").value;

if(unit==="month"){
    age = age/12;
}

const selectedDrug=document.getElementById("drug").value;

const selectedIndication=document.getElementById("indication").value;

const drug=drugs.find(d=>

d.Name===selectedDrug &&

d.Indication===selectedIndication &&

age>=parseFloat(d.Age_Min_Year) &&

age<=parseFloat(d.Age_Max_Year)

);

if(!drug){

document.getElementById("result").innerHTML=
`
<h3>No matching regimen found</h3>
`;

return;

}

let doseMin, doseMax;

if(drug["Weight_Based"]==="N"){
    doseMin = parseFloat(drug["Min (mkday)"]);
    doseMax = parseFloat(drug["Max (mkday)"]);
}
else{
    doseMin = weight * parseFloat(drug["Min (mkday)"]);
    doseMax = weight * parseFloat(drug["Max (mkday)"]);
}

console.log(drug["Min (mkday)"]);
console.log(drug["Max (mkday)"]);
console.log(parseFloat(drug["Min (mkday)"]));
console.log(parseFloat(drug["Max (mkday)"]));

const volMin = doseMin / parseFloat(drug["Conc per mL (mg/mL)"]);
const volMax = doseMax / parseFloat(drug["Conc per mL (mg/mL)"]);
  
const frequency = drug["Frequency"] || "-";
const maxDailyRaw = drug["MaxDailyDose_mg"];

console.log("MaxDailyDose_mg =", maxDailyRaw);

const maxDaily = Number(maxDailyRaw);

console.log("maxDaily =", maxDaily);

document.getElementById("result").innerHTML=
`
<h2>${drug.Name}</h2>

<hr>

<h3>Dose Range</h3>
<p>
${drug["Min (mkday)"]} - ${drug["Max (mkday)"]} mg/kg/dose
</p>

<h3>Calculated Dose</h3>
<p>
${doseMin.toFixed(1)} - ${doseMax.toFixed(1)} mg/dose
</p>

<h3>Volume</h3>
<p>
${volMin.toFixed(1)} - ${volMax.toFixed(1)} mL/dose
</p>

<h3>Frequency</h3>
<p>
${frequency}
</p>

<h3>Maximum Daily Dose</h3>
<p>
${maxDaily.toLocaleString()} mg/day
</p>
`;

}

loadDrugs();

</script>
</body>
</html>
